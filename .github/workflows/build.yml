name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip testapp.zip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install dependencies
        run: |
          cd testapp
          npm install

      - name: Add Android Platform
        run: |
          cd testapp
          cordova platform add android

      - name: Build APK
        run: |
          cd testapp2
          cordova build android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: testapp2/platforms/android/app/build/outputs/apk/debug/*.apk
